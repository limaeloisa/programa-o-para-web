<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Função</title>
    <script type="text/javascript">
        function message(){
            alert("Essa caixa é um alerta")

    <button type="button" onclick="message()">
        Clique </button>
